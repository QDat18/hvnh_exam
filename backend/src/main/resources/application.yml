spring:
  application:
    name: hvnh-exam-system

  # ===============================
  # PostgreSQL (Supabase)
  # ===============================
  datasource:
    # ⚠️ QUAN TRỌNG: Phải có ?sslmode=require ở cuối
    # Nếu bị lỗi "Prepared statement... exists", hãy thêm &prepareThreshold=0 vào cuối URL
    url: jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
    username: postgres.wqxjubsrqsxeejcsokqb
    password: ${DB_PASSWORD}  
    driver-class-name: org.postgresql.Driver
    hikari:
      max-lifetime: 580000
      keepalive-time: 30000
      connection-timeout: 30000
      validation-timeout: 3000
      maximum-pool-size:  3
      minimum-idle: 1


  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # 👇 FIX LỖI "Method org.postgresql.jdbc.PgConnection.createClob() is not yet implemented"
        jdbc:
          lob:
            non_contextual_creation: true

  # ===============================
  # MongoDB (Logs)
  # ===============================
  data:
    mongodb:
      uri: ${MONGODB_URI}

  # ===============================
  # Jackson (JSON format)
  # ===============================
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false

  
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# ===============================
# Server
# ===============================
server:
  port: 8080

# ===============================
# Logging
# ===============================
logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace

# ===============================
# 👇 THÊM MỚI: CẤU HÌNH SUPABASE AUTH
# ===============================
supabase:
  # Vào Settings -> API để lấy URL này
  url: ${SUPABASE_URL}
  
  key:
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
    
  jwt:
    # Vào Settings -> API -> JWT Settings -> JWT Secret (Dùng để giải mã Token)
    secret: ${SUPABASE_JWT_SECRET}
  
  bucket:
    name: documents
    
ai:
  api:
    key: ${AI_API_KEY:}
  nvidia:
    url: ${AI_NVIDIA_URL:https://integrate.api.nvidia.com/v1/chat/completions}
    model: ${AI_NVIDIA_MODEL:google/gemma-4-31b-it}

